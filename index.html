<!DOCTYPE html>
<html>
<head>
<title>Water Monitoring System</title>
<style>

body{
font-family:Arial;
background:#d8c8c8;
text-align:center;
padding-top:50px;
}

.container{
width:400px;
margin:auto;
background:rgb(83, 214, 109);
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);

}

h1{
color:#ffffff;
}

.level{
font-size:50px;
font-weight:bold;
margin:20px 0;
color: white;
}

.motor{
font-size:30px;
color: white;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
font-weight: 900;
border-radius: 10px;
margin-top: 10px;
border: solid rgb(232, 160, 60) 3px;
background-color: rgb(255, 255, 255);
}

</style>
</head>

<body>

<div class="container">

<h1>Water Monitoring System</h1>

<div class="level" id="waterLevel">
0%
</div>

<div class="motor" id="motorStatus">
Motor OFF
</div>

<button onclick="connectArduino()">
Connect Arduino
</button>

</div>

<script>

async function connectArduino() {

try {

const port =
await navigator.serial.requestPort();

await port.open({
baudRate:9600
});

const reader =
port.readable.getReader();

const decoder =
new TextDecoder();

let buffer = "";

while (true) {

const { value, done } =
await reader.read();

if (done) break;

buffer += decoder.decode(value);

let lines =
buffer.split("\n");

buffer =
lines.pop();

for (let line of lines) {

line = line.trim();

console.log(line);

const data =
line.split(",");

if (data.length === 2) {

document.getElementById("waterLevel")
.innerText =
data[0] + "%";

document.getElementById("motorStatus")
.innerText =
data[1];
}
}
}

}

catch(error){

console.log(error);
alert(error);

}

}

</script>

</body>
</html>
